<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xinzo Shop</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }
    header {
      background: #111;
      color: white;
      padding: 15px 20px;
      text-align: center;
      font-size: 24px;
      letter-spacing: 1px;
    }
    .container {
      max-width: 1100px;
      margin: 20px auto;
      padding: 10px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }
    .product-card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }
    .product-card img {
      width: 100%;
      border-radius: 8px;
    }
    .product-card h3 {
      margin: 10px 0 5px;
      font-size: 18px;
    }
    .product-card p {
      color: #777;
      font-size: 14px;
    }
    .buy-btn {
      display: inline-block;
      padding: 10px 15px;
      margin-top: 10px;
      border: none;
      background: #111;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
    .buy-btn:hover {
      opacity: 0.8;
    }
    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>Xinzo Online Store</header>

  <div class="container">
    <h2>Featured Products</h2>
    <div class="product-grid">
      <div class="product-card">
        <img src="https://via.placeholder.com/300" alt="Product" />
        <h3>Sample Product 1</h3>
        <p>$19.90</p>
        <button class="buy-btn">Buy</button>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/300" alt="Product" />
        <h3>Sample Product 2</h3>
        <p>$29.90</p>
        <button class="buy-btn">Buy</button>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/300" alt="Product" />
        <h3>Sample Product 3</h3>
        <p>$9.90</p>
        <button class="buy-btn">Buy</button>
      </div>
    </div>
  </div>

  <footer>© 2026 Xinzo • Free Shopping Website Template</footer>
</body>
</html>
